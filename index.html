<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Clario Demo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#000;width:1280px;height:720px;overflow:hidden;font-family:'DM Sans',sans-serif;}
#scene{width:1280px;height:720px;position:relative;background:#000;overflow:hidden;}
.grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(22,101,52,0.06) 1px,transparent 1px),linear-gradient(90deg,rgba(22,101,52,0.06) 1px,transparent 1px);background-size:60px 60px;opacity:0;transition:opacity 1s;}
.browser{position:absolute;background:#111;border-radius:12px;border:1px solid #1a2a1a;overflow:hidden;box-shadow:0 40px 120px rgba(0,0,0,0.8),0 0 0 1px rgba(34,197,94,0.1);transition:transform 0.9s cubic-bezier(0.4,0,0.2,1);}
.browser-bar{background:#1a1a1a;height:38px;display:flex;align-items:center;padding:0 16px;gap:8px;border-bottom:1px solid #222;}
.browser-dots{display:flex;gap:6px;}
.dot{width:12px;height:12px;border-radius:50%;}
.dot-r{background:#ff5f57;}.dot-y{background:#febc2e;}.dot-g{background:#28c840;}
.browser-url{flex:1;margin:0 16px;background:#0a0a0a;border-radius:6px;height:24px;display:flex;align-items:center;padding:0 12px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#4d8c4d;}
.app-header{background:#000;border-bottom:1px solid #0d2d0d;height:52px;display:flex;align-items:center;padding:0 24px;gap:10px;}
.app-logo-icon{width:26px;height:26px;background:linear-gradient(135deg,#166534,#16a34a);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:12px;font-weight:800;color:#fff;}
.app-logo-text{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:#fff;}
.app-badge{font-family:'JetBrains Mono',monospace;font-size:8px;color:#22c55e;background:#061a06;border:1px solid #0d3d1a;padding:2px 7px;border-radius:20px;letter-spacing:1px;}
.app-nav{margin-left:auto;display:flex;gap:8px;align-items:center;}
.nav-btn{font-size:11px;font-weight:600;padding:5px 12px;border-radius:5px;cursor:pointer;background:transparent;color:#4d8c4d;border:1px solid #0d2d0d;}
.nav-btn.active{background:#061a06;color:#22c55e;border-color:#0d3d1a;}
.connect-btn-ui{font-size:11px;font-weight:700;padding:6px 16px;border-radius:5px;background:#166534;color:#22c55e;border:1px solid #16a34a;}
.wallet-chip-ui{font-family:'JetBrains Mono',monospace;font-size:10px;color:#22c55e;background:#061a06;border:1px solid #0d3d1a;padding:5px 12px;border-radius:5px;}
.app-hero{padding:28px 24px 20px;border-bottom:1px solid #0d2d0d;}
.app-hero-title{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:#fff;line-height:1.15;margin-bottom:8px;}

.app-hero-sub{font-size:11px;color:#4d8c4d;line-height:1.6;max-width:400px;margin-bottom:12px;}
.hero-pills{display:flex;gap:6px;flex-wrap:wrap;}
.pill{font-size:9px;font-weight:600;padding:3px 10px;border-radius:20px;background:#061a06;color:#22c55e;border:1px solid #0d3d1a;}
.personal-stats-bar{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid #0d2d0d;}
.pstat{padding:12px 18px;border-right:1px solid #0d2d0d;}

.pstat-num{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#22c55e;}
.pstat-label{font-size:9px;font-weight:700;color:#2a5c2a;text-transform:uppercase;letter-spacing:0.8px;margin-top:3px;}
.app-tabs{display:flex;border-bottom:1px solid #0d2d0d;padding:0 24px;}

.app-tab.active{color:#22c55e;border-bottom-color:#22c55e;}
.app-body{padding:20px 24px;}
.info-banner{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:#0d2d0d;border:1px solid #0d2d0d;border-radius:8px;overflow:hidden;margin-bottom:14px;}
.info-item{background:#060f06;padding:12px 16px;}
.info-num{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:#22c55e;}
.info-desc{font-size:9px;font-weight:600;color:#2a5c2a;margin-top:3px;}
.escrow-card{background:#060f06;border:1px solid #0d2d0d;border-radius:8px;padding:14px;margin-bottom:10px;}
.escrow-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.esc-id{font-family:'JetBrains Mono',monospace;font-size:8px;color:#2a5c2a;margin-bottom:3px;}
.esc-desc{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#fff;}
.badge{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:600;padding:3px 8px;border-radius:20px;}
.badge-active{background:#0a1a00;color:#22c55e;border:1px solid #0d3d1a;}
.badge-delivered{background:#1a1000;color:#f59e0b;border:1px solid #3d2800;}

.esc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px;}
.esc-cell{background:#000;border:1px solid #0d2d0d;border-radius:5px;padding:7px 9px;}
.esc-cell-label{font-size:8px;font-weight:700;color:#2a5c2a;text-transform:uppercase;letter-spacing:0.5px;}
.esc-cell-val{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:#c8ffc8;margin-top:2px;}
.esc-addr{font-family:'JetBrains Mono',monospace;font-size:8px;color:#1a4a1a;margin-bottom:8px;padding:5px 8px;background:#000;border-radius:4px;border:1px solid #0a1a0a;display:flex;justify-content:space-between;}
.esc-actions{display:flex;gap:6px;}
.btn-release{font-size:10px;font-weight:700;padding:7px 14px;border-radius:5px;background:#0d3d1a;color:#22c55e;border:1px solid #166534;}
.btn-dispute{font-size:10px;font-weight:700;padding:7px 14px;border-radius:5px;background:#1a0000;color:#f87171;border:1px solid #3d0000;}
.btn-deliver{font-size:10px;font-weight:700;padding:7px 14px;border-radius:5px;background:#0d3d1a;color:#22c55e;border:1px solid #166534;}
.form-card{background:#060f06;border:1px solid #0d2d0d;border-radius:8px;padding:18px;}
.form-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:#fff;margin-bottom:14px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.form-full{margin-bottom:10px;}
.flabel{font-size:9px;font-weight:700;color:#4d8c4d;text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:4px;}
.finput-ui{width:100%;font-size:11px;padding:8px 10px;border:1px solid #0d2d0d;border-radius:5px;background:#000;color:#f0fff0;}
.finput-ui.filled{border-color:#0d3d1a;color:#22c55e;}
.fhint{background:#061a06;border:1px solid #0d3d1a;border-radius:6px;padding:10px;margin:10px 0;}
.fhint-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #0a1a0a;}
.fhint-row:last-child{border-bottom:none;}
.fhint-key{font-size:9px;font-weight:700;color:#2a5c2a;text-transform:uppercase;}
.fhint-val{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:#22c55e;}
.btn-submit-ui{width:100%;padding:10px;font-size:12px;font-weight:700;background:#166534;color:#22c55e;border:1px solid #16a34a;border-radius:6px;margin-top:8px;}
.mm-popup{position:absolute;background:#1a1a1a;border:1px solid #333;border-radius:12px;width:220px;padding:16px;box-shadow:0 20px 60px rgba(0,0,0,0.8);font-size:11px;z-index:100;}
.mm-logo{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.mm-fox{font-size:20px;}
.mm-title{font-size:13px;font-weight:700;color:#fff;}
.mm-network{background:#0a1a0a;border:1px solid #0d3d1a;border-radius:6px;padding:8px 10px;margin-bottom:10px;}
.mm-network-name{font-size:10px;font-weight:700;color:#22c55e;}
.mm-network-sub{font-size:9px;color:#4d8c4d;margin-top:2px;}
.mm-amount{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;color:#fff;text-align:center;margin:10px 0;}
.mm-label{font-size:9px;color:#666;text-align:center;margin-bottom:12px;}
.mm-btns{display:flex;gap:6px;}
.mm-reject{flex:1;padding:7px;border-radius:6px;background:#1a1a1a;border:1px solid #333;color:#999;font-size:10px;font-weight:700;}
.mm-confirm{flex:1;padding:7px;border-radius:6px;background:#166534;border:none;color:#22c55e;font-size:10px;font-weight:700;}
.delivery-modal{position:absolute;inset:0;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;z-index:50;}
.delivery-modal-inner{background:#0a0a0a;border:1px solid #1a3a1a;border-radius:10px;padding:20px;width:280px;}
.delivery-modal-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:#fff;margin-bottom:12px;}
.delivery-input{width:100%;font-size:11px;padding:8px 10px;border:1px solid #0d3d1a;border-radius:5px;background:#000;color:#22c55e;margin-bottom:8px;font-family:'JetBrains Mono',monospace;}
.delivery-sub-text{font-size:9px;color:#2a5c2a;margin-bottom:12px;}
.delivery-btns{display:flex;gap:6px;}
.delivery-submit{flex:1;padding:8px;background:#0d3d1a;color:#22c55e;border:1px solid #166634;border-radius:5px;font-size:11px;font-weight:700;}
.delivery-cancel{padding:8px 14px;background:#1a0000;color:#f87171;border:1px solid #3d0000;border-radius:5px;font-size:11px;font-weight:700;}
.tx-bar-ui{background:#061a06;border:1px solid #0d3d1a;border-radius:6px;padding:8px 12px;font-family:'JetBrains Mono',monospace;font-size:9px;color:#22c55e;margin-top:10px;}
.cursor{position:absolute;z-index:9000;pointer-events:none;width:22px;height:22px;border-radius:50%;background:rgba(34,197,94,0.85);box-shadow:0 0 0 3px rgba(34,197,94,0.25),0 0 18px rgba(34,197,94,0.5);transform:translate(-50%,-50%);opacity:0;transition:top 0.55s cubic-bezier(0.4,0,0.2,1),left 0.55s cubic-bezier(0.4,0,0.2,1),opacity 0.3s,transform 0.15s;}
.cursor.click{transform:translate(-50%,-50%) scale(0.55);}
.highlight-ring{position:absolute;z-index:8000;pointer-events:none;border:2px solid #22c55e;border-radius:8px;box-shadow:0 0 24px rgba(34,197,94,0.35);opacity:0;transition:opacity 0.3s,left 0.4s ease,top 0.4s ease,width 0.4s ease,height 0.4s ease;}
.caption{position:absolute;bottom:36px;left:50%;transform:translateX(-50%);z-index:9000;background:rgba(0,0,0,0.88);border:1px solid #0d3d1a;border-radius:8px;padding:10px 28px;font-size:14px;font-weight:600;color:#22c55e;font-family:'DM Sans',sans-serif;white-space:nowrap;opacity:0;transition:opacity 0.4s;backdrop-filter:blur(10px);}
.progress-bar{position:absolute;bottom:0;left:0;height:3px;background:linear-gradient(90deg,#22c55e,#16a34a);transition:width 0.1s linear;z-index:9999;}
.fade-overlay{position:absolute;inset:0;background:#000;z-index:8500;pointer-events:none;opacity:0;transition:opacity 0.5s;}
.step-indicator{position:absolute;top:20px;right:20px;z-index:9000;font-family:'JetBrains Mono',monospace;font-size:10px;color:#2a5c2a;background:rgba(0,0,0,0.7);border:1px solid #0d2d0d;border-radius:6px;padding:6px 12px;}
.play-screen{position:absolute;inset:0;background:#000;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;}
.play-btn{width:80px;height:80px;border-radius:50%;background:#0d3d1a;border:2px solid #22c55e;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:28px;color:#22c55e;box-shadow:0 0 40px rgba(34,197,94,0.3);transition:all 0.2s;}
.play-btn:hover{background:#166534;transform:scale(1.05);}
.play-title{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:#fff;}
.play-sub{font-size:14px;color:#4d8c4d;}
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="scene">
  <div class="grid-bg" id="grid-bg"></div>
  <div class="fade-overlay" id="fade"></div>
  <div class="progress-bar" id="progress" style="width:0%"></div>
  <div class="step-indicator" id="step-ind" style="opacity:0"></div>
  <div class="caption" id="caption"></div>
  <div class="cursor" id="cursor"></div>
  <div class="highlight-ring" id="highlight"></div>

  <div class="play-screen" id="play-screen">
    <div style="display:flex;align-items:center;gap:12px;">
      <div style="width:40px;height:40px;background:linear-gradient(135deg,#166534,#16a34a);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:#fff;">C</div>
      <span style="font-family:'Syne',sans-serif;font-size:32px;font-weight:800;color:#fff;">Clario</span>
      <span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:#22c55e;background:#061a06;border:1px solid #0d3d1a;padding:3px 8px;border-radius:20px;">ARC TESTNET</span>
    </div>
    <div class="play-title">How Clario Works</div>
    <div class="play-sub">Trustless Freelance Escrow on Arc &middot; 2:30 min demo</div>
    <div style="display:flex;align-items:center;gap:10px;background:#060f06;border:1px solid #0d3d1a;border-radius:8px;padding:10px 20px;">
      <span style="font-size:13px;">&#128266;</span>
      <span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:#4d8c4d;">Click &amp; zoom sound effects included</span>
      <span style="font-size:9px;color:#22c55e;background:#0d3d1a;padding:2px 8px;border-radius:10px;">BUILT-IN</span>
    </div>
    <div class="play-btn" onclick="startDemo()">&#9654;</div>
    <div style="font-size:12px;color:#2a5c2a;font-family:'JetBrains Mono',monospace;">Click to play &middot; Best in fullscreen</div>
  </div>

  <div id="scene-content" style="position:absolute;inset:0;opacity:0;transition:opacity 0.6s;"></div>
</div>

<script>
// =============================================
// SOUND ENGINE — Web Audio API, zero files
// =============================================
var SFX = (function(){
  var _c = null;
  function ctx(){ if(!_c) _c = new(window.AudioContext||window.webkitAudioContext)(); return _c; }

  function click(){
    try{
      var c=ctx(),o=c.createOscillator(),g=c.createGain();
      o.connect(g);g.connect(c.destination);o.type='sine';
      o.frequency.setValueAtTime(900,c.currentTime);
      o.frequency.exponentialRampToValueAtTime(300,c.currentTime+0.09);
      g.gain.setValueAtTime(0.15,c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.0001,c.currentTime+0.12);
      o.start();o.stop(c.currentTime+0.12);
    }catch(e){}
  }

  function zoomIn(){
    try{
      var c=ctx(),o=c.createOscillator(),g=c.createGain(),f=c.createBiquadFilter();
      o.connect(f);f.connect(g);g.connect(c.destination);
      o.type='sawtooth';f.type='lowpass';
      f.frequency.setValueAtTime(400,c.currentTime);
      f.frequency.exponentialRampToValueAtTime(2200,c.currentTime+0.5);
      o.frequency.setValueAtTime(80,c.currentTime);
      o.frequency.exponentialRampToValueAtTime(200,c.currentTime+0.5);
      g.gain.setValueAtTime(0.0001,c.currentTime);
      g.gain.linearRampToValueAtTime(0.09,c.currentTime+0.15);
      g.gain.exponentialRampToValueAtTime(0.0001,c.currentTime+0.55);
      o.start();o.stop(c.currentTime+0.6);
    }catch(e){}
  }

  function zoomOut(){
    try{
      var c=ctx(),o=c.createOscillator(),g=c.createGain(),f=c.createBiquadFilter();
      o.connect(f);f.connect(g);g.connect(c.destination);
      o.type='sawtooth';f.type='lowpass';
      f.frequency.setValueAtTime(2200,c.currentTime);
      f.frequency.exponentialRampToValueAtTime(300,c.currentTime+0.5);
      o.frequency.setValueAtTime(200,c.currentTime);
      o.frequency.exponentialRampToValueAtTime(60,c.currentTime+0.5);
      g.gain.setValueAtTime(0.0001,c.currentTime);
      g.gain.linearRampToValueAtTime(0.08,c.currentTime+0.1);
      g.gain.exponentialRampToValueAtTime(0.0001,c.currentTime+0.55);
      o.start();o.stop(c.currentTime+0.6);
    }catch(e){}
  }

  function success(){
    try{
      var c=ctx();
      [523,659,784].forEach(function(hz,i){
        var o=c.createOscillator(),g=c.createGain();
        o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.value=hz;
        var t=c.currentTime+i*0.11;
        g.gain.setValueAtTime(0.12,t);g.gain.exponentialRampToValueAtTime(0.0001,t+0.28);
        o.start(t);o.stop(t+0.3);
      });
    }catch(e){}
  }

  return {boot:ctx, click:click, zoomIn:zoomIn, zoomOut:zoomOut, success:success};
})();

// =============================================
// LAYOUT
// =============================================
var BX=100,BY=30,BW=1080,BBAR=38;
function contentTop(){return BY+BBAR;}

// =============================================
// TIMELINE
// =============================================
var timeline=[],startTime=null,totalDuration=150000;
function addScene(t,fn){timeline.push({time:t,fn:fn,ran:false});}

function startDemo(){
  SFX.boot();
  document.getElementById('play-screen').style.display='none';
  document.getElementById('grid-bg').style.opacity='1';
  document.getElementById('step-ind').style.opacity='1';
  document.getElementById('scene-content').style.opacity='1';
  startTime=performance.now();
  requestAnimationFrame(tick);
}

function tick(){
  var e=performance.now()-startTime;
  document.getElementById('progress').style.width=Math.min(e/totalDuration*100,100)+'%';
  for(var i=0;i<timeline.length;i++){
    if(!timeline[i].ran&&e>=timeline[i].time){timeline[i].ran=true;timeline[i].fn();}
  }
  if(e<totalDuration) requestAnimationFrame(tick);
}

// =============================================
// HELPERS
// =============================================
function setContent(h){document.getElementById('scene-content').innerHTML=h;}

function showCaption(txt,dur){
  dur=dur||3500;
  var c=document.getElementById('caption');
  c.textContent=txt;c.style.opacity='1';
  setTimeout(function(){c.style.opacity='0';},dur-500);
}

function setStep(t){document.getElementById('step-ind').textContent=t;}

function fadeTo(cb,dur){
  dur=dur||500;
  var f=document.getElementById('fade');
  f.style.opacity='1';
  setTimeout(function(){if(cb)cb();setTimeout(function(){f.style.opacity='0';},80);},dur);
}

function moveCursor(pt,cb,delay){
  delay=delay===undefined?650:delay;
  var c=document.getElementById('cursor');
  c.style.opacity='1';c.style.left=pt.x+'px';c.style.top=pt.y+'px';
  if(cb) setTimeout(cb,delay);
}

function clickCursor(pt,cb){
  var c=document.getElementById('cursor');
  c.style.opacity='1';c.style.left=pt.x+'px';c.style.top=pt.y+'px';
  setTimeout(function(){
    SFX.click();
    c.classList.add('click');
    setTimeout(function(){c.classList.remove('click');if(cb)cb();},200);
  },450);
}

function hideCursor(){document.getElementById('cursor').style.opacity='0';}

function showHighlight(x,y,w,h,dur){
  dur=dur||2200;
  var r=document.getElementById('highlight');
  r.style.left=x+'px';r.style.top=y+'px';r.style.width=w+'px';r.style.height=h+'px';r.style.opacity='1';
  setTimeout(function(){r.style.opacity='0';},dur);
}

function zoomTo(scale,originPt,dur){
  dur=dur||900;
  var b=document.querySelector('.browser');if(!b)return;
  var ox=originPt.x-BX,oy=originPt.y-BY;
  b.style.transition='transform '+dur+'ms cubic-bezier(0.4,0,0.2,1)';
  b.style.transformOrigin=ox+'px '+oy+'px';
  b.style.transform='scale('+scale+')';
  SFX.zoomIn();
}

function zoomReset(dur){
  dur=dur||900;
  var b=document.querySelector('.browser');if(!b)return;
  b.style.transition='transform '+dur+'ms cubic-bezier(0.4,0,0.2,1)';
  b.style.transform='scale(1)';
  SFX.zoomOut();
}

function getEl(id){
  var el=document.getElementById(id);if(!el)return null;
  var sr=document.getElementById('scene').getBoundingClientRect();
  var er=el.getBoundingClientRect();
  return{x:er.left-sr.left,y:er.top-sr.top,w:er.width,h:er.height,
         cx:er.left-sr.left+er.width/2,cy:er.top-sr.top+er.height/2};
}

function pointTo(id,cb,delay){
  requestAnimationFrame(function(){requestAnimationFrame(function(){
    var r=getEl(id);if(r)moveCursor({x:r.cx,y:r.cy},cb,delay);
  });});
}

function ringEl(id,pad,dur){
  pad=pad||4;
  requestAnimationFrame(function(){requestAnimationFrame(function(){
    var r=getEl(id);if(r)showHighlight(r.x-pad,r.y-pad,r.w+pad*2,r.h+pad*2,dur);
  });});
}

function zoomToEl(id,scale,dur){
  requestAnimationFrame(function(){requestAnimationFrame(function(){
    var r=getEl(id);if(r)zoomTo(scale,{x:r.cx,y:r.cy},dur);
  });});
}

function getElCenter(id){var r=getEl(id);return r?{x:r.cx,y:r.cy}:{x:640,y:360};}

function bHTML(inner){
  return '<div class="browser" style="left:'+BX+'px;top:'+BY+'px;width:'+BW+'px;">'
    +'<div class="browser-bar"><div class="browser-dots"><div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div></div>'
    +'<div class="browser-url">clario-app.vercel.app</div></div>'+inner+'</div>';
}

function shell(hero,mode,tb,body,wallet){
  wallet=wallet||'connect';
  var w=wallet==='connect'
    ?'<button class="connect-btn-ui" id="el-connect">Connect Wallet</button>'
    :'<div class="wallet-chip-ui" id="el-wallet">'+wallet+'</div>';
  return '<div class="app-header"><div class="app-logo-icon">C</div><span class="app-logo-text">Clario</span>'
    +'<span class="app-badge">ARC TESTNET</span><div class="app-nav">'
    +'<button class="nav-btn '+(mode==='client'?'active':'')+'" id="el-tab-client">Client</button>'
    +'<button class="nav-btn '+(mode==='freelancer'?'active':'')+'" id="el-tab-freelancer">Freelancer</button>'
    +w+'</div></div>'+hero+tb+body;
}

function hero(){
  return '<div class="app-hero" id="el-hero">'
    +'<div class="app-hero-title">Trustless payments for<br><span>freelancers &amp; clients.</span></div>'
    +'<div class="app-hero-sub">Clario escrows your USDC on Arc. Clients can\'t ghost. Freelancers can\'t be scammed.</div>'
    +'<div class="hero-pills" id="el-pills">'
    +'<span class="pill">&#10003; USDC Escrow</span><span class="pill">&#10003; Dispute Resolution</span>'
    +'<span class="pill">&#10003; Auto-Release in 3 days</span><span class="pill">&#10003; 1% Protocol Fee</span>'
    +'</div></div>';
}

function sbar(tot,act,comp,vol){
  return '<div class="personal-stats-bar" id="el-stats">'
    +'<div class="pstat"><div class="pstat-num">'+tot+'</div><div class="pstat-label">Your Escrows</div></div>'
    +'<div class="pstat"><div class="pstat-num">'+act+'</div><div class="pstat-label">Active</div></div>'
    +'<div class="pstat"><div class="pstat-num">'+comp+'</div><div class="pstat-label">Completed</div></div>'
    +'<div class="pstat"><div class="pstat-num">'+vol+'</div><div class="pstat-label">USDC Volume</div></div>'
    +'</div>';
}

function tabs(a){
  a=a||'list';
  return '<div class="app-tabs">'
    +'<button class="app-tab '+(a==='list'?'active':'')+'" id="el-tab-list">All Escrows</button>'
    +'<button class="app-tab '+(a==='create'?'active':'')+'" id="el-tab-new">+ New Escrow</button>'
    +'</div>';
}

function banner(){
  return '<div class="info-banner" id="el-banner">'
    +'<div class="info-item"><div class="info-num">100%</div><div class="info-desc">Funds locked before work begins</div></div>'
    +'<div class="info-item"><div class="info-num">3 days</div><div class="info-desc">Auto-release if client goes silent</div></div>'
    +'<div class="info-item"><div class="info-num">1%</div><div class="info-desc">Protocol fee on settled escrows</div></div>'
    +'</div>';
}

function card(id,desc,amt,recv,dl,status,a1,a2,link){
  link=link||'';
  var bm={active:'badge-active',delivered:'badge-delivered',completed:'badge-completed'};
  var lm={active:'ACTIVE',delivered:'DELIVERED',completed:'COMPLETED'};
  var am={
    active:'<button class="btn-deliver" id="el-btn-deliver">&#8594; Submit Delivery</button><button class="btn-dispute">&#9873; Dispute</button>',
    delivered:'<button class="btn-release" id="el-btn-release">&#10003; Release Payment</button><button class="btn-dispute">&#9873; Dispute</button>',
    completed:''
  };
  return '<div class="escrow-card" id="el-escrow-card">'
    +'<div class="escrow-card-header"><div><div class="esc-id">ESC-'+id+'</div><div class="esc-desc">'+desc+'</div></div>'
    +'<span class="badge '+bm[status]+'" id="el-badge">'+lm[status]+'</span></div>'
    +'<div class="esc-grid" id="el-esc-grid">'
    +'<div class="esc-cell"><div class="esc-cell-label">Amount</div><div class="esc-cell-val">'+amt+' USDC</div></div>'
    +'<div class="esc-cell"><div class="esc-cell-label">Freelancer gets</div><div class="esc-cell-val">'+recv+' USDC</div></div>'
    +'<div class="esc-cell"><div class="esc-cell-label">Deadline</div><div class="esc-cell-val" style="font-size:9px;">'+dl+'</div></div>'
    +'</div>'
    +'<div class="esc-addr" id="el-esc-addr"><span>Client: '+a1+'</span><span>Freelancer: '+a2+'</span></div>'
    +(link?'<div style="background:#061a06;border:1px solid #0d3d1a;border-radius:5px;padding:7px 10px;margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;font-size:8px;color:#22c55e;" id="el-delivery-link">'+link+'</div>':'')
    +'<div class="esc-actions">'+(am[status]||'')+'</div></div>';
}

function mm(amt,lbl,x,y){
  return '<div class="mm-popup" id="el-mm-popup" style="left:'+x+'px;top:'+y+'px;">'
    +'<div class="mm-logo"><span class="mm-fox">&#129418;</span><span class="mm-title">MetaMask</span></div>'
    +'<div class="mm-network"><div class="mm-network-name">Arc Testnet</div><div class="mm-network-sub">Chain ID: 5042002</div></div>'
    +'<div class="mm-amount">'+amt+'</div><div class="mm-label">'+lbl+'</div>'
    +'<div class="mm-btns"><button class="mm-reject">Reject</button><button class="mm-confirm" id="el-mm-confirm">Confirm</button></div>'
    +'</div>';
}
